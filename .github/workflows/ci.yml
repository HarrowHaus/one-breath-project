name: CI

# Runs on every push and PR. The accessibility gate (axe) fails the build if
# any WCAG 2.1 A/AA violation is found — a hard requirement for this project.
on:
  push:
  pull_request:

jobs:
  build-and-a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Accessibility check (axe)
        run: npm run test:a11y
